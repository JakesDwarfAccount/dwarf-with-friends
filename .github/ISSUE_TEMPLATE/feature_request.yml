name: Feature request
description: Suggest an idea or improvement for Dwarf With Friends
title: "[Idea]: "
labels:
  - enhancement
body:
  - type: textarea
    id: idea
    attributes:
      label: What would you like to see?
      description: Describe the feature or improvement and why it would help.
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Anything else?
      description: Workarounds you use today, sketches, examples — all optional.
    validations:
      required: false
